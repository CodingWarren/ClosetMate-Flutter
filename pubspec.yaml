name: closetmate
description: "ClosetMate Flutter cross-platform app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^16.0.0

  # Local database
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5

  # Models / utils
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.19.1

  # Network
  http: ^1.4.0

  # Env / secrets
  flutter_dotenv: ^5.2.1

  # Image / media
  image_picker: ^1.2.0
  image_cropper: ^9.1.0
  image: ^4.5.4
  cached_network_image: ^3.4.1

  # Location
  geolocator: ^13.0.0

  # Permissions
  permission_handler: ^12.0.1

  # Settings / local key-value
  shared_preferences: ^2.5.3

  # Biometrics / app lock
  local_auth: ^2.3.0

  # File / backup
  file_picker: ^10.2.0
  share_plus: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
